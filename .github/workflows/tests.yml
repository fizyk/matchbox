name: Run tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    uses: fizyk/actions-reuse/.github/workflows/shared-tests-pytests.yml@14e008c246b7b8eeab7cb5c543117471fee37310 # v5.1.2
    with:
      python-versions: '["3.10", "3.11", "3.12", "3.13", "3.14", "3.15", "pypy-3.11"]'
      dependency-manager: uv
    secrets:
      codecov_token: ${{ secrets.CODECOV_TOKEN }}
  benchmark:
    needs: tests
    uses: ./.github/workflows/benchmarks.yml
